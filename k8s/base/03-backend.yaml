apiVersion: apps/v1
kind: Deployment
metadata:
  name: collectorshop-back
  namespace: collectorshop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: collectorshop-back
  template:
    metadata:
      labels:
        app: collectorshop-back
    spec:
      imagePullSecrets:
        - name: ghcr-regcred
      containers:
        - name: collectorshop-back
          image: ghcr.io/maalsi-cube3/collectorshop-back:latest
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: 'Production'
            - name: ASPNETCORE_URLS
              value: 'http://+:8080'
            - name: ConnectionStrings__DefaultConnection
              value: 'Server=mssql;Database=CollectorShop;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True'
          resources:
            requests:
              memory: '256Mi'
              cpu: '100m'
            limits:
              memory: '512Mi'
              cpu: '500m'
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: collectorshop-back
  namespace: collectorshop
spec:
  selector:
    app: collectorshop-back
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: collectorshop-back
  namespace: collectorshop
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: 'true'
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - api.maalsikube.dev
      secretName: collectorshop-back-tls
  rules:
    - host: api.maalsikube.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: collectorshop-back
                port:
                  number: 8080
