<div class="checkout section">
  <div class="container">
    <h1>Checkout</h1>

    <div class="checkout__layout">
      <!-- Forms -->
      <div class="checkout__forms">
        <!-- Shipping -->
        <div class="checkout__section">
          <h2>Shipping Information</h2>
          <div class="form-grid">
            <div class="form-group">
              <label>First Name</label>
              <input type="text" placeholder="John" />
            </div>
            <div class="form-group">
              <label>Last Name</label>
              <input type="text" placeholder="Doe" />
            </div>
            <div class="form-group full-width">
              <label>Email</label>
              <input type="email" placeholder="john@example.com" />
            </div>
            <div class="form-group full-width">
              <label>Address</label>
              <input type="text" placeholder="123 Main St" />
            </div>
            <div class="form-group">
              <label>City</label>
              <input type="text" placeholder="New York" />
            </div>
            <div class="form-group">
              <label>Postal Code</label>
              <input type="text" placeholder="10001" />
            </div>
            <div class="form-group full-width">
              <label>Country</label>
              <select>
                <option>United States</option>
                <option>Canada</option>
                <option>United Kingdom</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Payment -->
        <div class="checkout__section">
          <h2>Payment Method</h2>
          <div class="payment-methods">
            <label class="payment-option">
              <input type="radio" name="payment" checked />
              <span class="payment-option__content">
                <i class="pi pi-credit-card"></i>
                Credit Card
              </span>
            </label>
            <label class="payment-option">
              <input type="radio" name="payment" />
              <span class="payment-option__content">
                <i class="pi pi-paypal"></i>
                PayPal
              </span>
            </label>
          </div>
          <div class="form-grid" style="margin-top: 1.5rem">
            <div class="form-group full-width">
              <label>Card Number</label>
              <input type="text" placeholder="1234 5678 9012 3456" />
            </div>
            <div class="form-group">
              <label>Expiry Date</label>
              <input type="text" placeholder="MM/YY" />
            </div>
            <div class="form-group">
              <label>CVV</label>
              <input type="text" placeholder="123" />
            </div>
          </div>
        </div>
      </div>

      <!-- Order Summary -->
      <div class="checkout__summary">
        <h2>Order Summary</h2>
        <div class="order-items">
          <div class="order-item">
            <img src="https://placehold.co/60x60/1a1a1a/c9a962?text=1" alt="Product" />
            <div class="order-item__info">
              <span class="name">Charizard Holo</span>
              <span class="qty">Qty: 1</span>
            </div>
            <span class="price">$15,000</span>
          </div>
          <div class="order-item">
            <img src="https://placehold.co/60x60/1a1a1a/c9a962?text=2" alt="Product" />
            <div class="order-item__info">
              <span class="name">Pikachu Plush</span>
              <span class="qty">Qty: 2</span>
            </div>
            <span class="price">$300</span>
          </div>
        </div>
        <div class="summary-row">
          <span>Subtotal</span>
          <span>$15,300.00</span>
        </div>
        <div class="summary-row">
          <span>Shipping</span>
          <span>$25.00</span>
        </div>
        <div class="summary-row">
          <span>Tax</span>
          <span>$1,226.00</span>
        </div>
        <div class="summary-row total">
          <span>Total</span>
          <span>$16,551.00</span>
        </div>
        <button class="btn-accent btn-lg" style="width: 100%">Place Order</button>
      </div>
    </div>
  </div>
</div>
