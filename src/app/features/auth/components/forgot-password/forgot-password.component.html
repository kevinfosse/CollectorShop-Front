<div class="auth-page">
  <div class="auth-card">
    <div class="auth-card__header">
      <h1>{{ 'AUTH.FORGOT_PASSWORD.TITLE' | translate }}</h1>
      <p>{{ 'AUTH.FORGOT_PASSWORD.SUBTITLE' | translate }}</p>
    </div>

    @if (sent()) {
      <div class="success-message">
        <i class="pi pi-check-circle"></i>
        <p>{{ 'TOAST.FORGOT_PASSWORD_SENT' | translate }}</p>
      </div>
    } @else {
      <form class="auth-form" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label>{{ 'AUTH.FORGOT_PASSWORD.EMAIL' | translate }}</label>
          <input type="email" placeholder="you@example.com" [(ngModel)]="email" name="email" required />
        </div>
        <button type="submit" class="btn-primary btn-lg" style="width: 100%" [disabled]="loading() || !email">
          @if (loading()) {
            <i class="pi pi-spinner pi-spin"></i>
          }
          {{ 'AUTH.FORGOT_PASSWORD.SEND_LINK' | translate }}
        </button>
      </form>
    }

    <div class="auth-card__footer">
      <p>{{ 'AUTH.FORGOT_PASSWORD.REMEMBER_PASSWORD' | translate }} <a routerLink="/auth/login">{{ 'AUTH.FORGOT_PASSWORD.SIGN_IN' | translate }}</a></p>
    </div>
  </div>
</div>
