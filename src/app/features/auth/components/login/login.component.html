<div class="auth-page">
  <div class="auth-card">
    <div class="auth-card__header">
      <h1>{{ 'AUTH.LOGIN.TITLE' | translate }}</h1>
      <p>{{ 'AUTH.LOGIN.SUBTITLE' | translate }}</p>
    </div>

    @if (error()) {
      <div class="alert alert-error">{{ error() }}</div>
    }

    <form class="auth-form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">{{ 'AUTH.LOGIN.EMAIL' | translate }}</label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="email"
          placeholder="you@example.com"
          [disabled]="loading()"
          required
        />
      </div>
      <div class="form-group">
        <label for="password">{{ 'AUTH.LOGIN.PASSWORD' | translate }}</label>
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="password"
          placeholder="••••••••"
          [disabled]="loading()"
          required
        />
      </div>
      <div class="form-row">
        <label class="checkbox">
          <input type="checkbox" name="rememberMe" [(ngModel)]="rememberMe" />
          <span>{{ 'AUTH.LOGIN.REMEMBER_ME' | translate }}</span>
        </label>
        <a routerLink="/auth/forgot-password" class="link">{{ 'AUTH.LOGIN.FORGOT_PASSWORD' | translate }}</a>
      </div>
      <button type="submit" class="btn-primary btn-lg" [disabled]="loading()">
        @if (loading()) {
          {{ 'AUTH.LOGIN.SIGNING_IN' | translate }}
        } @else {
          {{ 'AUTH.LOGIN.SIGN_IN' | translate }}
        }
      </button>
    </form>

    <div class="auth-card__footer">
      <p>{{ 'AUTH.LOGIN.NO_ACCOUNT' | translate }} <a routerLink="/auth/register">{{ 'AUTH.LOGIN.SIGN_UP' | translate }}</a></p>
    </div>
  </div>
</div>
