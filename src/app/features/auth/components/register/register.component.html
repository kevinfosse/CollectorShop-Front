<div class="auth-page">
  <div class="auth-card">
    <div class="auth-card__header">
      <h1>Create Account</h1>
      <p>Join our community of collectors</p>
    </div>

    @if (error()) {
      <div class="alert alert-error">{{ error() }}</div>
    }

    <form class="auth-form" (ngSubmit)="onSubmit()">
      <div class="form-row-split">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <input
            type="text"
            id="firstName"
            name="firstName"
            [(ngModel)]="firstName"
            placeholder="John"
            [disabled]="loading()"
            required
          />
        </div>
        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input
            type="text"
            id="lastName"
            name="lastName"
            [(ngModel)]="lastName"
            placeholder="Doe"
            [disabled]="loading()"
            required
          />
        </div>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="email"
          placeholder="you@example.com"
          [disabled]="loading()"
          required
        />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="password"
          placeholder="••••••••"
          [disabled]="loading()"
          required
          minlength="8"
        />
        <p class="password-hint">
          Min. 8 characters with uppercase, lowercase, digit &amp; special character
        </p>
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input
          type="password"
          id="confirmPassword"
          name="confirmPassword"
          [(ngModel)]="confirmPassword"
          placeholder="••••••••"
          [disabled]="loading()"
          required
        />
      </div>
      <label class="checkbox">
        <input type="checkbox" name="agreeToTerms" [(ngModel)]="agreeToTerms" />
        <span>
          I agree to the <a href="/terms">Terms of Service</a> and
          <a href="/privacy">Privacy Policy</a>
        </span>
      </label>
      <button type="submit" class="btn-primary btn-lg" [disabled]="loading()">
        @if (loading()) {
          Creating Account...
        } @else {
          Create Account
        }
      </button>
    </form>

    <div class="auth-card__footer">
      <p>Already have an account? <a routerLink="/auth/login">Sign in</a></p>
    </div>
  </div>
</div>
