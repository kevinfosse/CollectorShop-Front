<div class="auth-page">
  <div class="auth-card">
    <div class="auth-card__header">
      <h1>{{ 'AUTH.RESET_PASSWORD.TITLE' | translate }}</h1>
      <p>{{ 'AUTH.RESET_PASSWORD.SUBTITLE' | translate }}</p>
    </div>

    @if (error()) {
      <div class="error-message">{{ error() }}</div>
    }

    <form class="auth-form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>{{ 'AUTH.RESET_PASSWORD.NEW_PASSWORD' | translate }}</label>
        <input type="password" [(ngModel)]="newPassword" name="newPassword" required />
      </div>
      <div class="form-group">
        <label>{{ 'AUTH.RESET_PASSWORD.CONFIRM_PASSWORD' | translate }}</label>
        <input type="password" [(ngModel)]="confirmNewPassword" name="confirmNewPassword" required />
      </div>
      <button type="submit" class="btn-primary btn-lg" style="width: 100%" [disabled]="loading() || !newPassword || !confirmNewPassword">
        @if (loading()) {
          <i class="pi pi-spinner pi-spin"></i>
        }
        {{ 'AUTH.RESET_PASSWORD.SUBMIT' | translate }}
      </button>
    </form>

    <div class="auth-card__footer">
      <p><a routerLink="/auth/login">{{ 'AUTH.RESET_PASSWORD.BACK_TO_LOGIN' | translate }}</a></p>
    </div>
  </div>
</div>
