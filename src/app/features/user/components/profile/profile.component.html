<div class="account section">
  <div class="container">
    <div class="account__layout">
      <!-- Sidebar -->
      <aside class="account__sidebar">
        <div class="user-info">
          <div class="user-info__avatar">{{ initials }}</div>
          <h3 class="user-info__name">{{ fullName }}</h3>
          <p class="user-info__email">{{ email }}</p>
        </div>
        <nav class="account-nav">
          <a
            routerLink="/account"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            class="account-nav__link"
          >
            <i class="pi pi-user"></i> My Profile
          </a>
          <a routerLink="/account/orders" routerLinkActive="active" class="account-nav__link">
            <i class="pi pi-box"></i> Orders
          </a>
          <a routerLink="/account/wishlist" routerLinkActive="active" class="account-nav__link">
            <i class="pi pi-heart"></i> Wishlist
          </a>
          <a routerLink="/account/settings" routerLinkActive="active" class="account-nav__link">
            <i class="pi pi-cog"></i> Settings
          </a>
          <button (click)="onLogout()" class="account-nav__link logout">
            <i class="pi pi-sign-out"></i> Sign Out
          </button>
        </nav>
      </aside>

      <!-- Main Content -->
      <main class="account__main">
        <h1>My Profile</h1>

        @if (error()) {
          <div class="alert alert--error">{{ error() }}</div>
        }

        @if (successMessage()) {
          <div class="alert alert--success">{{ successMessage() }}</div>
        }

        @if (loading()) {
          <div class="profile-card">
            <p>Loading profile...</p>
          </div>
        } @else {
          <div class="profile-card">
            <h2>Personal Information</h2>
            <form class="profile-form" [formGroup]="profileForm" (ngSubmit)="onSave()">
              <div class="form-row">
                <div class="form-group">
                  <label for="firstName">First Name</label>
                  <input id="firstName" type="text" formControlName="firstName" />
                </div>
                <div class="form-group">
                  <label for="lastName">Last Name</label>
                  <input id="lastName" type="text" formControlName="lastName" />
                </div>
              </div>
              <div class="form-group">
                <label>Email</label>
                <input type="email" [value]="email" disabled />
              </div>
              <div class="form-group">
                <label for="phoneNumber">Phone</label>
                <input
                  id="phoneNumber"
                  type="tel"
                  formControlName="phoneNumber"
                  placeholder="+1 (555) 000-0000"
                />
              </div>
              <button
                type="submit"
                class="btn-primary"
                [disabled]="profileForm.invalid || saving()"
              >
                {{ saving() ? 'Saving...' : 'Save Changes' }}
              </button>
            </form>
          </div>
        }
      </main>
    </div>
  </div>
</div>
