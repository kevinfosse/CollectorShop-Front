<h1>{{ 'ACCOUNT.MY_PROFILE' | translate }}</h1>

@if (error()) {
  <div class="alert alert--error">{{ error() }}</div>
}

@if (successMessage()) {
  <div class="alert alert--success">{{ successMessage() }}</div>
}

@if (loading()) {
  <div class="profile-card">
    <p>{{ 'ACCOUNT.LOADING_PROFILE' | translate }}</p>
  </div>
} @else {
  <div class="profile-card">
    <h2>{{ 'ACCOUNT.PERSONAL_INFO' | translate }}</h2>
    <form class="profile-form" [formGroup]="profileForm" (ngSubmit)="onSave()">
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">{{ 'ACCOUNT.FIRST_NAME' | translate }}</label>
          <input id="firstName" type="text" formControlName="firstName" />
        </div>
        <div class="form-group">
          <label for="lastName">{{ 'ACCOUNT.LAST_NAME' | translate }}</label>
          <input id="lastName" type="text" formControlName="lastName" />
        </div>
      </div>
      <div class="form-group">
        <label>{{ 'ACCOUNT.EMAIL' | translate }}</label>
        <input type="email" [value]="email" disabled />
      </div>
      <div class="form-group">
        <label for="phoneNumber">{{ 'ACCOUNT.PHONE' | translate }}</label>
        <input
          id="phoneNumber"
          type="tel"
          formControlName="phoneNumber"
          placeholder="+1 (555) 000-0000"
        />
      </div>
      <button
        type="submit"
        class="btn-primary"
        [disabled]="profileForm.invalid || saving()"
      >
        {{ saving() ? ('ACCOUNT.SAVING' | translate) : ('COMMON.SAVE' | translate) }}
      </button>
    </form>
  </div>
}
