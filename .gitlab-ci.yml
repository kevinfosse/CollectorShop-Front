stages:
  - lint
  - build
  - test
  - security
  - sonar
  - docker
  - deploy

variables:
  NODE_VERSION: '22'
  PROJECT_NAME: 'collectorshop-front'
  NODE_OPTIONS: '--max_old_space_size=4096'
  IMAGE_NAME: $CI_REGISTRY_IMAGE
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA

default:
  image: node:22-alpine
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
      - .angular/cache/
  before_script:
    - npm ci

# ── Stage 1: Lint ──────────────────────────────────────────
lint:
  stage: lint
  script:
    - npx ng lint
  allow_failure: false

# ── Stage 2: Build ─────────────────────────────────────────
build:
  stage: build
  script:
    - npx ng build --configuration=production
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour
  allow_failure: false

# ── Stage 3: Test ──────────────────────────────────────────
test:
  stage: test
  script:
    - npx ng test --watch=false
  allow_failure: false

# ── Stage 4: Security ─────────────────────────────────────
security:audit:
  stage: security
  script:
    - npm audit --audit-level=high || true
    - npm audit --audit-level=critical
  allow_failure: false

# ── Stage 5: SonarCloud ───────────────────────────────────
sonar:
  stage: sonar
  image: sonarsource/sonar-scanner-cli:latest
  variables:
    SONAR_USER_HOME: '${CI_PROJECT_DIR}/.sonar'
    GIT_DEPTH: '0'
  cache:
    key: sonar-cache
    paths:
      - .sonar/cache
  before_script: []
  script:
    - >
      sonar-scanner
      -Dsonar.projectKey="${SONAR_PROJECT_KEY}"
      -Dsonar.organization="${SONAR_ORGANIZATION}"
      -Dsonar.token="${SONAR_TOKEN}"
      -Dsonar.host.url="https://sonarcloud.io"
      -Dsonar.sources="src"
      -Dsonar.exclusions="**/node_modules/**,**/dist/**,**/*.spec.ts"
      -Dsonar.qualitygate.wait=true
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  allow_failure: true

# ════════════════════════════════════════════════════════════
# DOCKER STAGE — Nexus (school K8s) + GitLab Registry (Azure)
# ════════════════════════════════════════════════════════════

# Push to Nexus registry (school/K8s infra)
docker:nexus:
  stage: docker
  image: docker:27
  services:
    - docker:27-dind
  tags:
    - deploy
  variables:
    DOCKER_TLS_CERTDIR: ''
  before_script: []
  script:
    - docker login -u $NEXUS_USER -p $NEXUS_PASSWORD $NEXUS_REGISTRY
    - docker build -t $NEXUS_REGISTRY/$PROJECT_NAME:$CI_COMMIT_SHORT_SHA -t $NEXUS_REGISTRY/$PROJECT_NAME:latest .
    - docker push $NEXUS_REGISTRY/$PROJECT_NAME:$CI_COMMIT_SHORT_SHA
    - docker push $NEXUS_REGISTRY/$PROJECT_NAME:latest
  dependencies:
    - build
  rules:
    - if: $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# Push to GitLab Container Registry (Azure VM)
docker:gitlab:
  stage: docker
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: '/certs'
  before_script: []
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $IMAGE_NAME:$IMAGE_TAG -t $IMAGE_NAME:latest .
    - docker push $IMAGE_NAME:$IMAGE_TAG
    - docker push $IMAGE_NAME:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_TAG

# Trivy CVE scan on GitLab Registry image
trivy:scan:
  stage: docker
  image:
    name: aquasec/trivy:latest
    entrypoint: ['']
  needs:
    - docker:gitlab
  before_script: []
  script:
    - >
      trivy image
      --exit-code 1
      --severity CRITICAL
      --ignore-unfixed
      --username $CI_REGISTRY_USER
      --password $CI_REGISTRY_PASSWORD
      $IMAGE_NAME:$IMAGE_TAG
  allow_failure: false
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_TAG

# ════════════════════════════════════════════════════════════
# DEPLOY STAGE — Both targets
# ════════════════════════════════════════════════════════════

# Deploy to school K8s cluster
deploy:k8s:
  stage: deploy
  image: bitnami/kubectl:latest
  tags:
    - deploy
  environment:
    name: school
    url: 'https://172.16.47.13:30084'
  variables:
    KUBECONFIG: '$KUBECONFIG_BASE64'
    KUBE_NAMESPACE: 'grpcube3'
    APP_NAME: 'collectorshop-front'
  before_script: []
  script:
    - |
      kubectl create secret docker-registry nexus-regcred \
        --docker-server="$NEXUS_REGISTRY" \
        --docker-username="$NEXUS_USER" \
        --docker-password="$NEXUS_PASSWORD" \
        -n "$KUBE_NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
    - |
      IMAGE_FULL="$NEXUS_REGISTRY/$APP_NAME:$CI_COMMIT_SHORT_SHA"
      kubectl -n "$KUBE_NAMESPACE" set image deployment/"$APP_NAME" "$APP_NAME"="$IMAGE_FULL"
      kubectl -n "$KUBE_NAMESPACE" rollout status deployment/"$APP_NAME" --timeout=300s
    - kubectl -n "$KUBE_NAMESPACE" get deployment,pods,svc -l app="$APP_NAME"
  dependencies:
    - docker:nexus
  rules:
    - if: $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "main"
      when: manual
    - if: $CI_COMMIT_TAG
      when: manual

# Deploy to Azure VM (maalsikube.dev)
deploy:azure:
  stage: deploy
  image: alpine:latest
  needs:
    - docker:gitlab
    - trivy:scan
  before_script: []
  script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - |
      if [ -f "$SSH_PRIVATE_KEY" ]; then
        cp "$SSH_PRIVATE_KEY" ~/.ssh/id_rsa
      else
        echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
      fi
    - chmod 600 ~/.ssh/id_rsa
    - echo "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
    - ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/id_rsa "${SSH_USER}@${SSH_HOST}" "
        set -e &&
        echo '${CI_REGISTRY_PASSWORD}' | docker login -u '${CI_REGISTRY_USER}' --password-stdin ${CI_REGISTRY} &&
        cd /opt/services/apps &&
        docker compose pull collectorshop-front &&
        docker compose up -d collectorshop-front &&
        test \"\$(docker inspect -f '{{.State.Running}}' collectorshop-front)\" = \"true\" &&
        docker image prune -f
      "
  environment:
    name: production
    url: https://maalsikube.dev
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
      when: manual
