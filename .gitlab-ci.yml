stages:
  - lint
  - build
  - security
  - sonar
  - docker
  - deploy

variables:
  NODE_VERSION: "25"
  PROJECT_NAME: "collectorshop-front"
  NODE_OPTIONS: "--max_old_space_size=4096"

default:
  image: node:25-alpine
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
  before_script:
    - npm ci

lint:format:
  stage: lint
  script:
    - npm run lint
    - npx run format:check
  allow_failure: false

build:
  stage: build
  script:
    - npx ng build --configuration=production
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour
  allow_failure: false

security:audit:
  stage: security
  script:
    - npm audit --audit-level=critical 2>&1 | tee audit.txt
    - |
      if grep -q "found [1-9]" audit.txt; then
        echo "⚠️ Vulnerable packages found!"
        cat audit.txt
        exit 1
      fi
  allow_failure: false

sonar:analysis:
  stage: sonar
  image: sonarsource/sonar-scanner-cli:latest
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
  cache:
    key: sonar-cache
    paths:
      - .sonar/cache
  script:
    - sonar-scanner
        -Dsonar.projectKey="maalsi-cube3_CollectorShop-Front"
        -Dsonar.organization="maalsi-cube3"
        -Dsonar.token="${SONAR_TOKEN}"
        -Dsonar.host.url="${SONAR_HOST_URL}"
        -Dsonar.sources="src"
        -Dsonar.exclusions="**/node_modules/**,**/dist/**,**/*.spec.ts"
        -Dsonar.javascript.lcov.reportPaths="coverage/lcov.info"
  only:
    - main
    - master
    - merge_requests

docker:build:
  stage: docker
  image: docker:20.10
  variables:
    DOCKER_TLS_CERTDIR: ""
  before_script: []  
  script:
    - docker login -u $NEXUS_USER -p $NEXUS_PASSWORD $NEXUS_REGISTRY
    - docker build -t $NEXUS_REGISTRY/$PROJECT_NAME:$CI_COMMIT_SHORT_SHA -t $NEXUS_REGISTRY/$PROJECT_NAME:latest .
    - docker push $NEXUS_REGISTRY/$PROJECT_NAME:$CI_COMMIT_SHORT_SHA
    - docker push $NEXUS_REGISTRY/$PROJECT_NAME:latest
  dependencies:
    - build
  only:
    - main
    - master
    - tags

deploy:k8s:
  stage: deploy
  image: bitnami/kubectl:latest
  tags:
    - deploy
  environment: 
    name: production
    url: "https://172.16.47.13:30084"
  variables:
    KUBECONFIG: "$KUBECONFIG_BASE64"
    KUBE_NAMESPACE: "grpcube3"
    APP_NAME: "collectorshop-front"
  script:
    # ImagePull secret Nexus (persistant)
    - |
      kubectl create secret docker-registry nexus-regcred \
        --docker-server="$NEXUS_REGISTRY" \
        --docker-username="$NEXUS_USER" \
        --docker-password="$NEXUS_PASSWORD" \
        -n "$KUBE_NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
    
    # Patch image + rollout
    - |
      IMAGE_FULL="$NEXUS_REGISTRY/$APP_NAME:$CI_COMMIT_SHORT_SHA"
      kubectl -n "$KUBE_NAMESPACE" set image deployment/"$APP_NAME" "$APP_NAME"="$IMAGE_FULL"
      kubectl -n "$KUBE_NAMESPACE" rollout status deployment/"$APP_NAME" --timeout=300s
    
    # Status
    - kubectl -n "$KUBE_NAMESPACE" get deployment,pods,svc -l app="$APP_NAME"
  dependencies:
    - docker:build
  only:
    - main
    - tags
  when: manual
