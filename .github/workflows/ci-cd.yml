name: CI/CD Pipeline

on:
  push:
    branches: [master, main]
    tags: ['*']
  pull_request:
    branches: [master, main]

env:
  NODE_VERSION: '22'
  PROJECT_NAME: 'collectorshop-front'
  IMAGE_NAME: ghcr.io/maalsi-cube3/collectorshop-front

jobs:
  # ── Stage 1: Lint ──────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npx ng lint

  # ── Stage 2: Build ─────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npx ng build --configuration=production
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ── Stage 3: Test ──────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npx ng test --watch=false || true

  # ── Stage 4: Security ─────────────────────────────────────
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm audit --audit-level=critical

  # ── Stage 5: SonarCloud ───────────────────────────────────
  sonar:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: sonarsource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.sources=src
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/*.spec.ts
            -Dsonar.qualitygate.wait=false

  # ── Stage 6: Docker Build & Push ───────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: [lint, build, test, security]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/'))
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Stage 7: Trivy Security Scan ───────────────────────────
  trivy:
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:latest
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL'
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

  # ── Stage 8: Deploy to Azure VM ────────────────────────────
  deploy-azure:
    runs-on: ubuntu-latest
    needs: [docker, trivy]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment: production
    steps:
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            echo '${{ secrets.GHCR_TOKEN }}' | docker login ghcr.io -u ${{ secrets.GHCR_USER }} --password-stdin
            cd /opt/services/apps
            docker compose pull collectorshop-front
            docker compose up -d --no-deps collectorshop-front
            test "$(docker inspect -f '{{.State.Running}}' collectorshop-front)" = "true"
            docker image prune -f

  # ── Stage 9: Docker Build & Push to Nexus ─────────────────
  docker-nexus:
    runs-on: ubuntu-latest
    needs: [lint, build, test, security]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/'))
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Log in to Nexus Registry
        run: echo "${{ secrets.NEXUS_PASSWORD }}" | docker login ${{ secrets.NEXUS_REGISTRY }} -u ${{ secrets.NEXUS_USER }} --password-stdin

      - name: Build and push to Nexus
        run: |
          docker build -t ${{ secrets.NEXUS_REGISTRY }}/${{ env.PROJECT_NAME }}:${{ github.sha }} -t ${{ secrets.NEXUS_REGISTRY }}/${{ env.PROJECT_NAME }}:latest .
          docker push ${{ secrets.NEXUS_REGISTRY }}/${{ env.PROJECT_NAME }}:${{ github.sha }}
          docker push ${{ secrets.NEXUS_REGISTRY }}/${{ env.PROJECT_NAME }}:latest

  # ── Stage 10: Deploy to K8s ───────────────────────────────
  deploy-k8s:
    runs-on: ubuntu-latest
    needs: docker-nexus
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment: school
    env:
      KUBE_NAMESPACE: 'grpcube3'
      APP_NAME: 'collectorshop-front'
    steps:
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_BASE64 }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Create Nexus registry secret
        run: |
          kubectl create secret docker-registry nexus-regcred \
            --docker-server="${{ secrets.NEXUS_REGISTRY }}" \
            --docker-username="${{ secrets.NEXUS_USER }}" \
            --docker-password="${{ secrets.NEXUS_PASSWORD }}" \
            -n "${{ env.KUBE_NAMESPACE }}" --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to K8s
        run: |
          IMAGE_FULL="${{ secrets.NEXUS_REGISTRY }}/${{ env.APP_NAME }}:${{ github.sha }}"
          kubectl -n "${{ env.KUBE_NAMESPACE }}" set image deployment/"${{ env.APP_NAME }}" "${{ env.APP_NAME }}"="$IMAGE_FULL"
          kubectl -n "${{ env.KUBE_NAMESPACE }}" rollout status deployment/"${{ env.APP_NAME }}" --timeout=300s

      - name: Verify deployment
        run: kubectl -n "${{ env.KUBE_NAMESPACE }}" get deployment,pods,svc -l app="${{ env.APP_NAME }}"
