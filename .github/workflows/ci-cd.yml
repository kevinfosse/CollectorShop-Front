name: CI/CD Pipeline

on:
  push:
    branches: [master, main, develop]
    tags: ['*']
  pull_request:
    branches: [master, main]

env:
  NODE_VERSION: '22'
  PROJECT_NAME: 'collectorshop-front'
  IMAGE_NAME: ghcr.io/maalsi-cube3/collectorshop-front

jobs:
  # ── Stage 1: Lint ──────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npx ng lint

  # ── Stage 2: Build ─────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Set build config
        id: config
        run: |
          if [ "${{ github.ref }}" = "refs/heads/master" ]; then
            echo "value=production" >> $GITHUB_OUTPUT
          else
            echo "value=prod-vm" >> $GITHUB_OUTPUT
          fi
      - name: Build Angular
        run: npx ng build --configuration=${{ steps.config.outputs.value }}
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ── Stage 3: Test ──────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npx ng test --watch=false || true

  # ── Stage 4: Security ─────────────────────────────────────
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm audit --audit-level=critical

  # ── Stage 5: SonarCloud ───────────────────────────────────
  sonar:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: sonarsource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.sources=src
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/*.spec.ts
            -Dsonar.qualitygate.wait=false

  # ── Stage 6: Docker Build & Push ───────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: [lint, build, test, security]
    if: |
      github.event_name == 'push' && 
      (github.ref == 'refs/heads/master' || 
       github.ref == 'refs/heads/develop' || 
       startsWith(github.ref, 'refs/tags/'))
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Set build config
        id: config
        run: |
          if [ "${{ github.ref }}" = "refs/heads/master" ]; then
            echo "value=production" >> $GITHUB_OUTPUT
          else
            echo "value=prod-vm" >> $GITHUB_OUTPUT
          fi
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest
            type=raw,value=${{ github.ref == 'refs/heads/develop' && 'preprod' || 'production' }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: BUILD_CONFIG=${{ steps.config.outputs.value }}

  # ── Stage 7: Trivy Security Scan ───────────────────────────
  trivy:
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop')
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:latest
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL'
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

  # ── Stage 8: Deploy to K8s ────────────────────────────────
  deploy-k8s:
    runs-on: ubuntu-latest
    needs: [docker, trivy]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment: production
    env:
      KUBE_NAMESPACE: 'collectorshop'
      APP_NAME: 'collectorshop-front'
      KUBECONFIG: /tmp/kubeconfig
    steps:
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        shell: bash
        run: |
          echo "${{ secrets.KUBECONFIG_BASE64 }}" | base64 --decode > $KUBECONFIG
          chmod 600 $KUBECONFIG

      - name: Create GHCR registry secret
        run: |
          kubectl create secret docker-registry ghcr-regcred \
            --docker-server="ghcr.io" \
            --docker-username="${{ github.actor }}" \
            --docker-password="${{ secrets.GITHUB_TOKEN }}" \
            -n "${{ env.KUBE_NAMESPACE }}" --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to K8s
        run: |
          IMAGE_FULL="${{ env.IMAGE_NAME }}:${{ github.sha }}"
          kubectl -n "${{ env.KUBE_NAMESPACE }}" set image deployment/"${{ env.APP_NAME }}" "${{ env.APP_NAME }}"="$IMAGE_FULL"
          kubectl -n "${{ env.KUBE_NAMESPACE }}" rollout status deployment/"${{ env.APP_NAME }}" --timeout=300s

      - name: Verify deployment
        run: kubectl -n "${{ env.KUBE_NAMESPACE }}" get deployment,pods,svc -l app="${{ env.APP_NAME }}"
