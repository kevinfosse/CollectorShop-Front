server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # JS/CSS chunks — must return 404 if not found (never fallback to index.html)
    location ~* \.(?:js|css|woff2?|ttf|eot|ico|svg|png|jpg|jpeg|gif|webp)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — only for navigation routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
